<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>姜子牙形象方案对比</title>
<style>
  body { background: #1A1814; color: #F5E6D3; font-family: "Songti SC", serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
  h1 { color: #D4A853; margin-bottom: 40px; font-weight: normal; letter-spacing: 0.15em; }
  .schemes { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; }
  .scheme { background: rgba(212,168,83,0.05); border: 1px solid rgba(212,168,83,0.15); border-radius: 12px; padding: 24px; text-align: center; min-width: 280px; }
  .scheme h3 { color: #D4A853; margin-bottom: 16px; font-weight: normal; }
  .scheme p { color: rgba(245,230,211,0.5); font-size: 13px; margin-bottom: 16px; }
  .scene-bg { width: 280px; height: 200px; background: linear-gradient(180deg,#2B1810 0%,#4A2820 10%,#6B4030 25%,#8B6040 45%,#C49B6A 70%,#E8CFA0 90%,#F5E6D3 100%); border-radius: 8px; position: relative; overflow: hidden; margin: 0 auto; }
  svg { display: block; }
</style>
</head>
<body>
<h1>姜子牙形象方案</h1>
<div class="schemes">

  <!-- 方案A: 精致国风 -->
  <div class="scheme">
    <h3>方案A · 精致国风</h3>
    <p>保留简约风格，增加白发长须、道袍衣褶，更有仙风道骨之感</p>
    <div class="scene-bg">
      <svg viewBox="0 0 280 200" width="280" height="200">
        <defs>
          <radialGradient id="glowA" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#D4A853" stop-opacity="0.12"/><stop offset="100%" stop-color="#D4A853" stop-opacity="0"/></radialGradient>
        </defs>
        <!-- 仙气光晕 -->
        <circle cx="140" cy="110" r="55" fill="url(#glowA)" style="animation:glow 3s ease-in-out infinite"/>
        <!-- 身体/道袍 -->
        <path d="M110 80 Q108 130 105 175 Q140 185 175 175 Q172 130 170 80 Q155 75 140 75 Q125 75 110 80Z" fill="#2A2018" opacity="0.9"/>
        <path d="M115 85 Q113 130 110 170" stroke="#3A3020" stroke-width="1.5" fill="none" opacity="0.6"/>
        <path d="M165 85 Q167 130 170 170" stroke="#3A3020" stroke-width="1.5" fill="none" opacity="0.6"/>
        <!-- 衣领 -->
        <path d="M125 78 L140 95 L155 78" fill="none" stroke="#D4A853" stroke-width="1.2" opacity="0.5"/>
        <!-- 腰带 -->
        <rect x="112" y="125" width="56" height="5" rx="2" fill="#D4A853" opacity="0.4"/>
        <circle cx="140" cy="127.5" r="4" fill="none" stroke="#D4A853" stroke-width="1" opacity="0.6"/>
        <!-- 脸部 -->
        <ellipse cx="140" cy="58" rx="14" ry="16" fill="#E8CBA0" opacity="0.92"/>
        <!-- 白发 -->
        <path d="M126 48 Q120 35 128 28 Q140 22 152 28 Q160 35 154 48" fill="#E8E0D0" opacity="0.85"/>
        <path d="M128 30 Q140 24 152 30" fill="none" stroke="#F5F0E8" stroke-width="1" opacity="0.6"/>
        <!-- 发髻 -->
        <circle cx="140" cy="26" r="5" fill="#E8E0D0" opacity="0.85"/>
        <circle cx="140" cy="26" r="2" fill="#D4A853" opacity="0.8"/>
        <!-- 帽子 -->
        <path d="M128 36 L140 8 L152 36" fill="#3A3028" opacity="0.85"/>
        <ellipse cx="140" cy="36" rx="14" ry="3" fill="#3A3028" opacity="0.85"/>
        <!-- 眼睛 (微闭，仙风道骨) -->
        <path d="M132 56 Q135 54 138 56" stroke="#2A1A08" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <path d="M142 56 Q145 54 148 56" stroke="#2A1A08" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <!-- 眉毛 -->
        <path d="M130 50 Q134 48 138 50" stroke="#E8E0D0" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.7"/>
        <path d="M142 50 Q146 48 150 50" stroke="#E8E0D0" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.7"/>
        <!-- 胡须 -->
        <path d="M140 68 Q138 85 135 95 Q132 105 140 110 Q148 105 145 95 Q142 85 140 68" fill="#E8E0D0" opacity="0.75"/>
        <path d="M140 72 Q137 88 133 98" stroke="#F5F0E8" stroke-width="0.8" fill="none" opacity="0.5"/>
        <path d="M140 72 Q143 88 147 98" stroke="#F5F0E8" stroke-width="0.8" fill="none" opacity="0.5"/>
        <!-- 嘴巴 (微笑) -->
        <path d="M136 65 Q140 68 144 65" stroke="#C4706A" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.7"/>
        <!-- 鱼竿 -->
        <line x1="168" y1="90" x2="210" y2="30" stroke="#5A4A3A" stroke-width="1.5" opacity="0.7"/>
        <line x1="210" y1="30" x2="218" y2="55" stroke="#5A4A3A" stroke-width="0.8" opacity="0.4"/>
        <circle cx="218" cy="55" r="2.5" fill="#D4A853" opacity="0.5"/>
        <!-- 手 -->
        <ellipse cx="165" cy="92" rx="4" ry="5" fill="#E8CBA0" opacity="0.88"/>
      </svg>
    </div>
  </div>

  <!-- 方案B: 传统神话 -->
  <div class="scheme">
    <h3>方案B · 传统神话</h3>
    <p>更接近传统绘画风格，白发飘逸、八卦道袍、手持打神鞭</p>
    <div class="scene-bg">
      <svg viewBox="0 0 280 200" width="280" height="200">
        <defs>
          <radialGradient id="glowB" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFD700" stop-opacity="0.1"/><stop offset="100%" stop-color="#FFD700" stop-opacity="0"/></radialGradient>
        </defs>
        <!-- 仙气 -->
        <circle cx="140" cy="105" r="60" fill="url(#glowB)"/>
        <!-- 道袍 -->
        <path d="M105 75 Q100 120 98 170 Q140 180 182 170 Q180 120 175 75 Q160 68 140 68 Q120 68 105 75Z" fill="#1E2832" opacity="0.9"/>
        <!-- 八卦纹饰 -->
        <circle cx="140" cy="115" r="12" fill="none" stroke="#D4A853" stroke-width="0.8" opacity="0.4"/>
        <path d="M140 103 A12 12 0 0 1 140 127 A6 6 0 0 0 140 115 A6 6 0 0 1 140 103" fill="#D4A853" opacity="0.3"/>
        <!-- 衣褶 -->
        <path d="M112 80 Q108 120 105 165" stroke="#2A3A4A" stroke-width="1.5" fill="none" opacity="0.5"/>
        <path d="M168 80 Q172 120 175 165" stroke="#2A3A4A" stroke-width="1.5" fill="none" opacity="0.5"/>
        <!-- 腰带 -->
        <rect x="108" y="125" width="64" height="6" rx="2" fill="#8B0000" opacity="0.6"/>
        <rect x="135" y="123" width="10" height="10" rx="2" fill="#D4A853" opacity="0.5"/>
        <!-- 脸部 -->
        <ellipse cx="140" cy="55" rx="13" ry="15" fill="#E8D5B0" opacity="0.92"/>
        <!-- 白发 -->
        <path d="M125 42 Q115 28 125 20 Q140 12 155 20 Q165 28 155 42" fill="#F0E8D8" opacity="0.9"/>
        <path d="M122 35 Q118 50 120 65" stroke="#F0E8D8" stroke-width="2" fill="none" opacity="0.7"/>
        <path d="M158 35 Q162 50 160 65" stroke="#F0E8D8" stroke-width="2" fill="none" opacity="0.7"/>
        <!-- 发髻 -->
        <ellipse cx="140" cy="16" rx="6" ry="4" fill="#F0E8D8" opacity="0.9"/>
        <circle cx="140" cy="12" r="2" fill="#D4A853" opacity="0.8"/>
        <!-- 道冠 -->
        <path d="M130 24 L140 2 L150 24" fill="#2A2018" opacity="0.85"/>
        <ellipse cx="140" cy="24" rx="12" ry="3" fill="#2A2018" opacity="0.85"/>
        <!-- 眼睛 -->
        <path d="M133 52 Q136 50 139 52" stroke="#1A1814" stroke-width="1" fill="none" stroke-linecap="round"/>
        <path d="M141 52 Q144 50 147 52" stroke="#1A1814" stroke-width="1" fill="none" stroke-linecap="round"/>
        <!-- 眉毛 (白色长眉) -->
        <path d="M128 46 Q134 43 140 46" stroke="#F0E8D8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path d="M140 46 Q146 43 152 46" stroke="#F0E8D8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- 长胡须 -->
        <path d="M140 65 Q136 90 130 115 Q128 130 140 140 Q152 130 150 115 Q144 90 140 65" fill="#F0E8D8" opacity="0.85"/>
        <path d="M140 70 Q135 95 132 120" stroke="#FFF" stroke-width="0.6" fill="none" opacity="0.4"/>
        <path d="M140 70 Q145 95 148 120" stroke="#FFF" stroke-width="0.6" fill="none" opacity="0.4"/>
        <!-- 嘴 -->
        <path d="M137 62 Q140 64 143 62" stroke="#B87060" stroke-width="0.8" fill="none" stroke-linecap="round"/>
        <!-- 打神鞭 -->
        <line x1="172" y1="85" x2="215" y2="25" stroke="#4A3A2A" stroke-width="2.5" opacity="0.8"/>
        <line x1="215" y1="25" x2="222" y2="50" stroke="#4A3A2A" stroke-width="1.2" opacity="0.5"/>
        <polygon points="222,48 225,55 219,55" fill="#D4A853" opacity="0.7"/>
        <!-- 手 -->
        <ellipse cx="170" cy="88" rx="4.5" ry="5.5" fill="#E8D5B0" opacity="0.88"/>
      </svg>
    </div>
  </div>

  <!-- 方案C: Q版可爱 -->
  <div class="scheme">
    <h3>方案C · Q版可爱</h3>
    <p>圆润可爱，大头小身体，保留标志性白发和鱼竿</p>
    <div class="scene-bg">
      <svg viewBox="0 0 280 200" width="280" height="200">
        <defs>
          <radialGradient id="glowC" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#D4A853" stop-opacity="0.08"/><stop offset="100%" stop-color="#D4A853" stop-opacity="0"/></radialGradient>
        </defs>
        <!-- 光晕 -->
        <circle cx="140" cy="100" r="50" fill="url(#glowC)"/>
        <!-- 身体 -->
        <path d="M118 82 Q115 125 112 165 Q140 172 168 165 Q165 125 162 82 Q152 78 140 78 Q128 78 118 82Z" fill="#3A3028" opacity="0.9"/>
        <!-- 衣领 -->
        <path d="M128 80 L140 92 L152 80" fill="none" stroke="#D4A853" stroke-width="1" opacity="0.5"/>
        <!-- 腰带 -->
        <rect x="116" y="118" width="48" height="5" rx="2" fill="#D4A853" opacity="0.4"/>
        <circle cx="140" cy="120.5" r="3.5" fill="#D4A853" opacity="0.5"/>
        <!-- 脸部 (更大更圆) -->
        <ellipse cx="140" cy="58" rx="18" ry="19" fill="#F0D8B0" opacity="0.95"/>
        <!-- 白发 -->
        <path d="M120 48 Q115 32 125 24 Q140 18 155 24 Q165 32 160 48" fill="#F5F0E8" opacity="0.9"/>
        <path d="M118 40 Q112 55 116 70" stroke="#F5F0E8" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
        <path d="M162 40 Q168 55 164 70" stroke="#F5F0E8" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
        <!-- 发髻 -->
        <circle cx="140" cy="20" r="6" fill="#F5F0E8" opacity="0.9"/>
        <circle cx="140" cy="20" r="2.5" fill="#D4A853" opacity="0.8"/>
        <!-- 小帽子 -->
        <path d="M128 32 L140 10 L152 32" fill="#4A3A30" opacity="0.85"/>
        <ellipse cx="140" cy="32" rx="14" ry="3" fill="#4A3A30" opacity="0.85"/>
        <!-- 大眼睛 -->
        <circle cx="134" cy="56" r="3" fill="#2A1A08"/>
        <circle cx="146" cy="56" r="3" fill="#2A1A08"/>
        <circle cx="135" cy="55" r="1" fill="white" opacity="0.8"/>
        <circle cx="147" cy="55" r="1" fill="white" opacity="0.8"/>
        <!-- 小胡子 -->
        <path d="M140 68 Q136 78 132 82" stroke="#E8E0D0" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path d="M140 68 Q144 78 148 82" stroke="#E8E0D0" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- 嘴巴 (微笑) -->
        <path d="M136 65 Q140 68 144 65" stroke="#C4706A" stroke-width="1" fill="none" stroke-linecap="round"/>
        <!-- 腮红 -->
        <ellipse cx="128" cy="64" rx="3" ry="2" fill="#E88A9A" opacity="0.2"/>
        <ellipse cx="152" cy="64" rx="3" ry="2" fill="#E88A9A" opacity="0.2"/>
        <!-- 鱼竿 -->
        <line x1="162" y1="88" x2="200" y2="35" stroke="#5A4A3A" stroke-width="2" opacity="0.7"/>
        <line x1="200" y1="35" x2="208" y2="58" stroke="#5A4A3A" stroke-width="1" opacity="0.4"/>
        <circle cx="208" cy="58" r="3" fill="#D4A853" opacity="0.5"/>
        <!-- 小手 -->
        <ellipse cx="160" cy="90" rx="4" ry="4.5" fill="#F0D8B0" opacity="0.9"/>
      </svg>
    </div>
  </div>

</div>

<style>
@keyframes glow {
  0%,100% { opacity: 0.6; }
  50% { opacity: 1; }
}
</style>
</body>
</html>
